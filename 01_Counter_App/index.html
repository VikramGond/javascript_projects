<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>
    <link rel="stylesheet" href="src/style.css">        
</head>
<body>
    <main class="main">

            <h1 id="count"></h1>

        <div class="controls">

            <button id="decrement" aria-label="Decrease Counter">-</button>
            <button id="reset" aria-label="Reset">Reset</button>
            <button id="increment" aria-label="Increase Counter">+</button>

        </div>

    </main>

    <script src="src/script.js"></script>
</body>
</html>
